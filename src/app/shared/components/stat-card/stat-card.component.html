<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 border-l-4 {{ colorClasses.bg }} hover:shadow-md transition-shadow duration-200">
  <div class="flex items-start justify-between">
    <div class="flex-1">
      <p class="text-sm font-medium text-gray-500 mb-1">{{ title() }}</p>
      <p class="text-2xl font-bold text-gray-900">{{ displayValue() }}</p>
      @if (subtitle()) {
        <p class="text-xs text-gray-400 mt-1">{{ subtitle() }}</p>
      }
      @if (trendValue()) {
        <div class="flex items-center gap-1 mt-2">
          @if (trend() === 'up') {
            <span class="text-green-500 text-xs font-medium flex items-center gap-0.5">
              <span class="material-icons-round" style="font-size:14px">trending_up</span>
              {{ trendValue() }}
            </span>
          } @else if (trend() === 'down') {
            <span class="text-red-500 text-xs font-medium flex items-center gap-0.5">
              <span class="material-icons-round" style="font-size:14px">trending_down</span>
              {{ trendValue() }}
            </span>
          }
        </div>
      }
    </div>
    <div class="w-12 h-12 rounded-xl {{ colorClasses.iconBg }} flex items-center justify-center flex-shrink-0">
      <span class="material-icons-round {{ colorClasses.text }}" style="font-size:22px">{{ icon() }}</span>
    </div>
  </div>
</div>
