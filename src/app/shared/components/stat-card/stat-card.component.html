<div class="stat-card border-l-4 {{ colorClasses.bg }} hover:shadow-card-md transition-shadow duration-200">
  <div class="flex items-start justify-between gap-3">
    <div class="flex-1 min-w-0">
      <p class="text-xs font-semibold uppercase tracking-wide mb-1" style="color: var(--text-muted)">{{ title() }}</p>
      <p class="text-2xl font-bold" style="color: var(--text-primary)">{{ displayValue() }}</p>
      @if (subtitle()) {
        <p class="text-xs mt-1" style="color: var(--text-muted)">{{ subtitle() }}</p>
      }
      @if (trendValue()) {
        <div class="flex items-center gap-1 mt-2">
          @if (trend() === 'up') {
            <span class="text-emerald-500 text-xs font-medium flex items-center gap-0.5">
              <span class="material-icons-round" style="font-size:13px">trending_up</span>
              {{ trendValue() }}
            </span>
          } @else if (trend() === 'down') {
            <span class="text-red-500 text-xs font-medium flex items-center gap-0.5">
              <span class="material-icons-round" style="font-size:13px">trending_down</span>
              {{ trendValue() }}
            </span>
          }
        </div>
      }
    </div>
    <div class="w-11 h-11 rounded-xl {{ colorClasses.iconBg }} flex items-center justify-center flex-shrink-0">
      <span class="material-icons-round {{ colorClasses.text }}" style="font-size:20px">{{ icon() }}</span>
    </div>
  </div>
</div>
