<div class="p-6 max-w-md" style="background: var(--surface); color: var(--text-ds);">
  <div class="flex items-start gap-4 mb-4">
    @if (data.danger) {
      <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0"
           style="background: var(--danger-soft); color: var(--danger); flex-shrink: 0;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
    } @else {
      <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0"
           style="background: var(--accent-soft); color: var(--accent); flex-shrink: 0;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
    }
    <div>
      <h2 class="text-lg font-semibold mb-1" style="color: var(--text-ds);">{{ data.title }}</h2>
      <p class="text-sm" style="color: var(--text-muted-ds);">{{ data.message }}</p>
    </div>
  </div>

  <div class="flex justify-end gap-3 mt-6">
    <button class="btn btn-ghost" (click)="cancel()">
      {{ data.cancelText || 'Cancelar' }}
    </button>
    <button [class]="data.danger ? 'btn btn-danger' : 'btn btn-primary'" (click)="confirm()">
      {{ data.confirmText || 'Confirmar' }}
    </button>
  </div>
</div>
