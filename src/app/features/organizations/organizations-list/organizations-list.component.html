<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Organizaciones</h1>
      <p class="text-sm text-gray-500 mt-1">Vista de plataforma — todas las organizaciones registradas</p>
    </div>
  </div>

  <div class="table-container">
    @if (loading()) {
      <div class="flex justify-center py-20"><mat-spinner diameter="40"></mat-spinner></div>
    } @else {
      <table mat-table [dataSource]="orgs()" class="w-full">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let o"><span class="font-medium text-gray-900">{{ o.name }}</span></td>
        </ng-container>
        <ng-container matColumnDef="ruc">
          <th mat-header-cell *matHeaderCellDef>RUC</th>
          <td mat-cell *matCellDef="let o" class="font-mono text-sm text-gray-600">{{ o.ruc }}</td>
        </ng-container>
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let o" class="text-gray-600">{{ o.email }}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Estado</th>
          <td mat-cell *matCellDef="let o">
            <span class="badge" [ngClass]="statusClass(o.status)">{{ statusLabel(o.status) }}</span>
          </td>
        </ng-container>
        <ng-container matColumnDef="created">
          <th mat-header-cell *matHeaderCellDef>Registrada</th>
          <td mat-cell *matCellDef="let o" class="text-sm text-gray-500">{{ o.created_at | date:'dd/MM/yyyy' }}</td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let o">
            <button mat-icon-button [matTooltip]="o.status === 'active' ? 'Desactivar' : 'Activar'" (click)="toggleStatus(o)">
              <mat-icon [class.text-green-500]="o.status === 'active'" [class.text-gray-400]="o.status !== 'active'">
                {{ o.status === 'active' ? 'toggle_on' : 'toggle_off' }}
              </mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell text-center py-12 text-gray-400" [attr.colspan]="displayedColumns.length">No hay organizaciones</td>
        </tr>
      </table>
      <mat-paginator [length]="total()" [pageSize]="limit()" [pageIndex]="page()-1"
        [pageSizeOptions]="[10,20,50]" (page)="onPageChange($event)" showFirstLastButtons />
    }
  </div>
</div>
