<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100">Empresas</h1>
      <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Vista de plataforma — todas las empresas registradas</p>
    </div>
  </div>

  <div class="table-container">
    @if (loading()) {
      <div class="flex justify-center py-20"><mat-spinner diameter="40"></mat-spinner></div>
    } @else {
      <table mat-table [dataSource]="companies()" class="w-full">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let c"><span class="font-medium">{{ c.name }}</span></td>
        </ng-container>
        <ng-container matColumnDef="ruc">
          <th mat-header-cell *matHeaderCellDef>RUC</th>
          <td mat-cell *matCellDef="let c" class="font-mono text-sm">{{ c.ruc }}</td>
        </ng-container>
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let c">{{ c.email }}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Estado</th>
          <td mat-cell *matCellDef="let c">
            <span class="badge" [ngClass]="statusClass(c.status)">{{ statusLabel(c.status) }}</span>
          </td>
        </ng-container>
        <ng-container matColumnDef="created">
          <th mat-header-cell *matHeaderCellDef>Registrada</th>
          <td mat-cell *matCellDef="let c" class="text-sm">{{ c.created_at | date:'dd/MM/yyyy' }}</td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let c">
            <div class="flex gap-1 justify-end">
              <a mat-icon-button [routerLink]="['/companies', c.id]" matTooltip="Ver detalle">
                <mat-icon class="text-slate-400">open_in_new</mat-icon>
              </a>
              <button mat-icon-button [matTooltip]="c.status === 'ACTIVE' ? 'Desactivar' : 'Activar'" (click)="toggleStatus(c)">
                <mat-icon [class.text-green-500]="c.status === 'ACTIVE'" [class.text-slate-400]="c.status !== 'ACTIVE'">
                  {{ c.status === 'ACTIVE' ? 'toggle_on' : 'toggle_off' }}
                </mat-icon>
              </button>
            </div>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell text-center py-12" [attr.colspan]="displayedColumns.length">No hay empresas registradas</td>
        </tr>
      </table>
      <mat-paginator [length]="total()" [pageSize]="limit()" [pageIndex]="page()-1"
        [pageSizeOptions]="[10,20,50]" (page)="onPageChange($event)" showFirstLastButtons />
    }
  </div>
</div>
