<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Categorías</h1>
      <p class="text-sm text-gray-500 mt-1">Organiza tus productos por categoría</p>
    </div>
    <a routerLink="/categories/new" mat-flat-button color="primary" class="flex items-center gap-2">
      <mat-icon>add</mat-icon>
      Nueva categoría
    </a>
  </div>

  <div class="table-container">
    @if (loading()) {
      <div class="flex justify-center py-20"><mat-spinner diameter="40"></mat-spinner></div>
    } @else {
      <table mat-table [dataSource]="categories()" class="w-full">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let c" class="font-medium text-gray-900">{{ c.name }}</td>
        </ng-container>
        <ng-container matColumnDef="parent">
          <th mat-header-cell *matHeaderCellDef>Categoría padre</th>
          <td mat-cell *matCellDef="let c">{{ c.parent?.name || '—' }}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Estado</th>
          <td mat-cell *matCellDef="let c">
            <span [class]="c.is_active ? 'badge-active' : 'badge-inactive'">
              {{ c.is_active ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let c">
            <div class="flex items-center gap-1">
              <a [routerLink]="['/categories', c.id, 'edit']" mat-icon-button matTooltip="Editar">
                <mat-icon class="text-gray-400">edit</mat-icon>
              </a>
              <button mat-icon-button matTooltip="Eliminar" (click)="delete(c)">
                <mat-icon class="text-red-400">delete</mat-icon>
              </button>
            </div>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell text-center py-12 text-gray-400" colspan="4">No hay categorías registradas</td>
        </tr>
      </table>
    }
  </div>
</div>
