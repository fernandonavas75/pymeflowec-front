<header class="ds-topbar">

  <!-- Sidebar toggle -->
  <button class="topbar-btn"
          [title]="sidebarCollapsed() ? 'Expandir menú' : 'Colapsar menú'"
          (click)="onToggleSidebar()">
    <app-icon [name]="sidebarCollapsed() ? 'menu' : 'menu_open'" [size]="18" class="icon" />
  </button>

  <!-- Client mode chip -->
  @if (adminViewSvc.isClientViewMode()) {
    <div class="client-chip" title="Visualizando como cliente de esta empresa">
      <app-icon name="visibility" [size]="13" />
      <span>{{ adminViewSvc.viewedCompany()!.name }}</span>
      <button class="chip-exit" title="Salir del modo cliente" (click)="adminViewSvc.exitClientView()">
        <app-icon name="close" [size]="10" />
      </button>
    </div>
  } @else if (companyName) {
    <span class="company-tag">
      <app-icon name="business" [size]="13" />
      {{ companyName }}
    </span>
  }

  <div style="flex:1"></div>

  <!-- Theme toggle -->
  <button class="topbar-btn"
          [title]="themeService.isDark() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
          (click)="themeService.toggle()">
    <app-icon [name]="themeService.isDark() ? 'light_mode' : 'dark_mode'" [size]="18" class="icon" />
  </button>

  <!-- User menu trigger -->
  <button class="user-btn" [matMenuTriggerFor]="userMenu">
    <div class="ds-avatar user-btn-avatar">{{ userInitials }}</div>
    <div class="user-btn-meta">
      <span class="n">{{ authService.currentUser()?.full_name }}</span>
      <span class="r">{{ authService.role() }}</span>
    </div>
    <app-icon name="expand_more" [size]="14" style="color:var(--text-subtle);flex-shrink:0" />
  </button>

  <mat-menu #userMenu="matMenu" xPosition="before">
    @if (adminViewSvc.isClientViewMode()) {
      <button mat-menu-item (click)="adminViewSvc.exitClientView()">
        <mat-icon>exit_to_app</mat-icon>
        <span>Salir del modo cliente</span>
      </button>
      <mat-divider />
    }
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Cerrar sesión</span>
    </button>
  </mat-menu>

</header>
