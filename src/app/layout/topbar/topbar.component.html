<header class="topbar">
  <!-- Toggle sidebar button -->
  <button class="topbar-toggle" (click)="onToggleSidebar()"
          [matTooltip]="sidebarCollapsed() ? 'Expandir menú' : 'Colapsar menú'">
    <mat-icon>{{ sidebarCollapsed() ? 'menu' : 'menu_open' }}</mat-icon>
  </button>

  <!-- Indicador modo cliente -->
  @if (adminViewSvc.isClientViewMode()) {
    <div class="client-view-chip" matTooltip="Estás visualizando la aplicación como cliente de esta empresa">
      <mat-icon>visibility</mat-icon>
      <span>{{ adminViewSvc.viewedCompany()!.name }}</span>
      <button class="chip-exit" (click)="adminViewSvc.exitClientView()" matTooltip="Salir del modo cliente">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  } @else if (companyName) {
    <!-- Company name (solo si tiene empresa y NO está en modo cliente) -->
    <span class="company-name">
      <mat-icon class="company-icon">business</mat-icon>
      {{ companyName }}
    </span>
  }

  <div class="topbar-spacer"></div>

  <!-- Theme toggle -->
  <button class="topbar-icon-btn"
          (click)="themeService.toggle()"
          [matTooltip]="themeService.isDark() ? 'Modo claro' : 'Modo oscuro'">
    <mat-icon>{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>

  <!-- User menu -->
  <button class="user-menu-btn" [matMenuTriggerFor]="userMenu">
    <div class="user-avatar">{{ userInitials }}</div>
    <div class="user-info">
      <span class="user-name">{{ authService.currentUser()?.full_name }}</span>
      <span class="user-role">{{ authService.role() }}</span>
    </div>
    <mat-icon class="chevron">expand_more</mat-icon>
  </button>

  <mat-menu #userMenu="matMenu" xPosition="before">
    @if (adminViewSvc.isClientViewMode()) {
      <button mat-menu-item (click)="adminViewSvc.exitClientView()">
        <mat-icon>exit_to_app</mat-icon>
        <span>Salir del modo cliente</span>
      </button>
      <mat-divider />
    }
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Cerrar sesión</span>
    </button>
  </mat-menu>
</header>
