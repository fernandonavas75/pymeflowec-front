<aside class="sidebar" [class.collapsed]="collapsed()">
  <!-- Logo area -->
  <div class="sidebar-header">
    @if (!collapsed()) {
      <div class="logo-full">
        <span class="logo-icon">
          <mat-icon>bolt</mat-icon>
        </span>
        <span class="logo-text">PymeFlow<span class="logo-accent">EC</span></span>
      </div>
    } @else {
      <div class="logo-icon-only">
        <mat-icon>bolt</mat-icon>
      </div>
    }
    <button class="collapse-btn" (click)="onToggle()" [matTooltip]="collapsed() ? 'Expandir' : 'Colapsar'">
      <mat-icon>{{ collapsed() ? 'chevron_right' : 'chevron_left' }}</mat-icon>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    @for (item of visibleNavItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="active"
        class="nav-item"
        [matTooltip]="collapsed() ? item.label : ''"
        matTooltipPosition="right"
      >
        <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
        @if (!collapsed()) {
          <span class="nav-label">{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <!-- User info at bottom -->
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar">{{ userInitials }}</div>
      @if (!collapsed()) {
        <div class="user-details">
          <p class="user-name">{{ authService.currentUser()?.full_name }}</p>
          <p class="user-role">{{ authService.role() }}</p>
        </div>
      }
    </div>
    <button class="logout-btn" (click)="logout()" [matTooltip]="collapsed() ? 'Cerrar sesión' : ''" matTooltipPosition="right">
      <mat-icon>logout</mat-icon>
      @if (!collapsed()) {
        <span>Salir</span>
      }
    </button>
  </div>
</aside>
